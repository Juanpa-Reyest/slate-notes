name: Release

# This robot wakes up when you push a version tag like "v0.1.0".
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    permissions:
      contents: write # allow the robot to create the GitHub Release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Slate ${{ github.ref_name }}"
          releaseBody: "Download the installer for your system below (.deb, .rpm or .AppImage)."
          releaseDraft: true
          prerelease: false
