name: Release

# Publishes a multi-OS release automatically whenever a version bump lands on
# main: if package.json's version changed in the push, the app is built for
# Linux, Windows and macOS, GitHub auto-generates the changelog from the merged
# PRs since the last release, and the release is published. Merges that do NOT
# change the version are ignored, so main never produces a phantom release.
#
# Author identity (B): every step authenticates with RELEASE_TOKEN if that
# secret exists (a fine-grained PAT with Contents: read & write), so releases are
# attributed to its owner instead of github-actions[bot]. If the secret is not
# set, it falls back to the automatic GITHUB_TOKEN (released as the bot).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect a version bump
        id: detect
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run -> releasing v$VERSION"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null; then
            PREV="$(node -p "require('/tmp/prev-package.json').version")"
          else
            PREV="none"
          fi
          if [ "$VERSION" != "$PREV" ]; then
            echo "Version changed $PREV -> $VERSION; releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change ($VERSION); skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write # allow the robot to create the draft Release

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # Linux  -> .deb / .rpm / .AppImage
            args: ""
          - platform: windows-latest # Windows -> .msi / .exe
            args: ""
          - platform: macos-latest # macOS -> .dmg (Intel + Apple Silicon)
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS needs both CPU targets to build a universal binary.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies (Tauri)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the installers and upload them to a draft release
        uses: tauri-apps/tauri-action@v0
        env:
          # B: prefer the user's PAT so the release is attributed to them; fall
          # back to the automatic token (github-actions[bot]) when it is absent.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: "Slate v${{ needs.check-version.outputs.version }}"
          releaseDraft: true # kept as a draft until the notes are generated below
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # allow editing/publishing the release

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can diff against the last tag

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve the release notes and publish the release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # Prefer the hand-written, user-facing section from CHANGELOG.md...
          node .github/scripts/extract-changelog.cjs "$VERSION" > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            # ...otherwise fall back to GitHub's auto-generated notes (the PRs
            # merged since the previous release).
            echo "No CHANGELOG.md section for $VERSION; using auto-generated notes."
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="v$VERSION" \
              -f target_commitish="${{ github.sha }}" \
              --jq '.body' > /tmp/release-notes.md
          fi
          gh release edit "v$VERSION" \
            --notes-file /tmp/release-notes.md \
            --draft=false \
            --latest
