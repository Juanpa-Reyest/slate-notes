name: Release

# Publishes a multi-OS release automatically whenever a version bump lands on
# main: if package.json's version changed in the push, the app is built for
# Linux, Windows and macOS and attached to a draft GitHub Release. Merges that
# do NOT change the version (chores, fixes without a bump) are ignored, so main
# never produces a phantom release. Can also be triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect a version bump
        id: detect
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run -> releasing v$VERSION"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null; then
            PREV="$(node -p "require('/tmp/prev-package.json').version")"
          else
            PREV="none"
          fi
          if [ "$VERSION" != "$PREV" ]; then
            echo "Version changed $PREV -> $VERSION; releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change ($VERSION); skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write # allow the robot to create the GitHub Release

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # Linux  -> .deb / .rpm / .AppImage
            args: ""
          - platform: windows-latest # Windows -> .msi / .exe
            args: ""
          - platform: macos-latest # macOS -> .dmg (Intel + Apple Silicon)
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS needs both CPU targets to build a universal binary.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies (Tauri)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: "Slate v${{ needs.check-version.outputs.version }}"
          releaseBody: "Download the installer for your operating system below (Linux .deb/.rpm/.AppImage, Windows .msi/.exe, macOS .dmg)."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
